<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elden Ring TCG — Deck Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Cinzel+Decorative:wght@400;700&display=swap"
        rel="stylesheet">
    <script src="/static/js/deck_rules.js"></script>
    <style>
        /* ── RESET & BASE ───────────────────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        :root {
            --gold: #c9a84c;
            --gold-bright: #f0d080;
            --gold-dim: rgba(201, 168, 76, 0.25);
            --gold-glow: rgba(201, 168, 76, 0.15);
            --bg: #080807;
            --surface: rgba(12, 11, 9, 0.85);
            --surface2: rgba(20, 18, 14, 0.9);
            --border: rgba(201, 168, 76, 0.18);
            --border-h: rgba(201, 168, 76, 0.55);
            --text: rgba(240, 220, 170, 0.85);
            --text-dim: rgba(200, 180, 130, 0.45);
            --red: #e05555;
            --cyan: #4fd1e0;
            --cyan-dim: rgba(79, 209, 224, 0.25);
        }

        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Cinzel', serif;
            overflow: hidden;
        }

        /* Sfondo fisso con overlay */
        body::before {
            content: "";
            background-image: url("/static/src/page_bg_raw.jpg");
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            position: fixed;
            inset: 0;
            opacity: 0.18;
            z-index: 0;
            pointer-events: none;
        }

        /* ── LAYOUT PRINCIPALE ──────────────────────────────────────── */
        #app {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-rows: auto 1fr;
            height: 100vh;
            overflow: hidden;
        }

        /* ── TOPBAR ─────────────────────────────────────────────────── */
        #topbar {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 10px 24px;
            background: rgba(8, 8, 7, 0.96);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.6);
            flex-shrink: 0;
        }

        #topbar .logo-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        #topbar .logo-wrap img {
            height: 38px;
            filter: drop-shadow(0 0 8px rgba(201, 168, 76, 0.4));
        }

        #topbar .logo-wrap .tcg-logo {
            height: 28px;
        }

        .topbar-sep {
            width: 1px;
            height: 32px;
            background: var(--border);
            flex-shrink: 0;
        }

        #topbar h1 {
            font-family: 'Cinzel Decorative', serif;
            font-size: 0.85rem;
            letter-spacing: 4px;
            color: var(--gold);
            text-transform: uppercase;
            margin: 0;
            flex-shrink: 0;
        }

        /* Deck tabs */
        #deckTabs {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            overflow-x: auto;
            scrollbar-width: none;
            padding: 2px 0;
        }

        #deckTabs::-webkit-scrollbar {
            display: none;
        }

        .deck-tab {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            font-family: 'Cinzel', serif;
            font-size: 0.65rem;
            letter-spacing: 2px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.25s;
            position: relative;
        }

        .deck-tab:hover {
            border-color: var(--border-h);
            color: var(--text);
        }

        .deck-tab.active {
            background: var(--gold-glow);
            border-color: var(--gold);
            color: var(--gold-bright);
        }

        .deck-tab.equipped-badge::after {
            content: "◆";
            font-size: 0.5rem;
            color: var(--cyan);
            margin-left: 4px;
        }

        .deck-tab .del-tab {
            background: none;
            border: none;
            cursor: pointer;
            color: rgba(224, 85, 85, 0.5);
            font-size: 0.7rem;
            padding: 0;
            line-height: 1;
            transition: color 0.2s;
        }

        .deck-tab .del-tab:hover {
            color: var(--red);
        }

        .btn-new-deck {
            padding: 5px 12px;
            border: 1px dashed var(--border);
            background: none;
            color: var(--text-dim);
            font-family: 'Cinzel', serif;
            font-size: 0.6rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.25s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .btn-new-deck:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        /* Topbar actions */
        .topbar-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            margin-left: auto;
        }

        .btn-action {
            padding: 6px 16px;
            border: 1px solid var(--border);
            background: none;
            font-family: 'Cinzel', serif;
            font-size: 0.6rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.25s;
            text-transform: uppercase;
        }

        .btn-save {
            color: var(--gold);
            border-color: rgba(201, 168, 76, 0.4);
        }

        .btn-save:hover {
            background: var(--gold-glow);
            border-color: var(--gold);
            box-shadow: 0 0 12px rgba(201, 168, 76, 0.2);
        }

        .btn-equip {
            color: var(--cyan);
            border-color: var(--cyan-dim);
        }

        .btn-equip:hover {
            background: var(--cyan-dim);
            border-color: var(--cyan);
            box-shadow: 0 0 12px rgba(79, 209, 224, 0.2);
        }

        .btn-equip.is-equipped {
            background: var(--cyan-dim);
            border-color: var(--cyan);
            color: var(--cyan);
        }

        .btn-back {
            color: var(--text-dim);
            border-color: var(--border);
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .btn-back:hover {
            color: var(--text);
            border-color: var(--border-h);
        }

        /* ── WORKSPACE ──────────────────────────────────────────────── */
        #workspace {
            display: grid;
            grid-template-columns: 1fr 340px;
            overflow: hidden;
            height: 100%;
        }

        /* ── CARD BROWSER (sinistra) ────────────────────────────────── */
        #browser {
            display: grid;
            grid-template-rows: auto 1fr;
            overflow: hidden;
            border-right: 1px solid var(--border);
        }

        #browserFilters {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: rgba(8, 8, 7, 0.7);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .filter-label {
            font-size: 0.55rem;
            letter-spacing: 2px;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .filter-select,
        .filter-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'Cinzel', serif;
            font-size: 0.6rem;
            padding: 5px 10px;
            outline: none;
            transition: border-color 0.2s;
        }

        .filter-select:focus,
        .filter-input:focus {
            border-color: var(--border-h);
        }

        .filter-input::placeholder {
            color: var(--text-dim);
        }

        .filter-input {
            width: 160px;
        }

        #cardGrid {
            overflow-y: auto;
            padding: 14px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 10px;
            align-content: start;
            scrollbar-width: thin;
            scrollbar-color: var(--gold-dim) transparent;
        }

        /* Card browser item */
        .card-thumb {
            position: relative;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: all 0.2s;
            overflow: hidden;
            aspect-ratio: 3/4;
        }

        .card-thumb:hover {
            border-color: var(--border-h);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
        }

        .card-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* overlay con info */
        .card-thumb-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, transparent 55%);
            opacity: 0;
            transition: opacity 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 6px;
        }

        .card-thumb:hover .card-thumb-overlay {
            opacity: 1;
        }

        .card-thumb-name {
            font-size: 0.55rem;
            letter-spacing: 1px;
            color: var(--gold-bright);
            line-height: 1.3;
            text-align: center;
        }

        .card-thumb-rarity {
            font-size: 0.5rem;
            text-align: center;
            margin-top: 2px;
        }

        /* Indicatore copie già in mazzo */
        .copy-badge {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid var(--gold);
            color: var(--gold-bright);
            font-size: 0.55rem;
            padding: 1px 5px;
            letter-spacing: 1px;
        }

        .copy-badge.maxed {
            border-color: var(--red);
            color: var(--red);
        }

        /* ── DECK PANEL (destra) ────────────────────────────────────── */
        #deckPanel {
            display: grid;
            grid-template-rows: auto 1fr auto;
            overflow: hidden;
            background: var(--surface2);
        }

        #deckHeader {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        #deckNameInput {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--gold-bright);
            font-family: 'Cinzel Decorative', serif;
            font-size: 0.9rem;
            letter-spacing: 3px;
            outline: none;
            width: 100%;
            padding: 4px 0;
            transition: border-color 0.2s;
        }

        #deckNameInput:focus {
            border-bottom-color: var(--gold);
        }

        #deckNameInput::placeholder {
            color: var(--text-dim);
            font-size: 0.75rem;
        }

        .deck-stats {
            display: flex;
            gap: 12px;
            font-size: 0.55rem;
            letter-spacing: 2px;
            color: var(--text-dim);
        }

        .deck-stats span {
            color: var(--text);
        }

        #deckCounter {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        #deckCounter.warning {
            color: #f59e0b;
        }

        #deckCounter.full {
            color: var(--gold);
        }

        /* Lista carte nel mazzo */
        #deckCardList {
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            scrollbar-width: thin;
            scrollbar-color: var(--gold-dim) transparent;
        }

        /* Riga carta nel mazzo */
        .deck-row {
            display: grid;
            grid-template-columns: 36px 1fr auto auto;
            align-items: center;
            gap: 6px;
            padding: 4px 6px;
            border: 1px solid transparent;
            transition: all 0.15s;
        }

        .deck-row:hover {
            border-color: var(--border);
            background: rgba(255, 255, 255, 0.02);
        }

        .deck-row-thumb {
            width: 36px;
            height: 48px;
            object-fit: cover;
            border: 1px solid var(--border);
        }

        .deck-row-info {
            overflow: hidden;
        }

        .deck-row-name {
            font-size: 0.6rem;
            letter-spacing: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
        }

        .deck-row-meta {
            font-size: 0.5rem;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .deck-row-count {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .count-btn {
            width: 18px;
            height: 18px;
            background: none;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 0.7rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            padding: 0;
        }

        .count-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .count-num {
            font-size: 0.7rem;
            color: var(--gold-bright);
            min-width: 14px;
            text-align: center;
        }

        .deck-row-remove {
            background: none;
            border: none;
            color: rgba(224, 85, 85, 0.4);
            font-size: 0.9rem;
            cursor: pointer;
            transition: color 0.15s;
            padding: 0;
            line-height: 1;
        }

        .deck-row-remove:hover {
            color: var(--red);
        }

        /* Deck panel footer */
        #deckFooter {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            background: rgba(8, 8, 7, 0.6);
        }

        .progress-bar-wrap {
            height: 3px;
            background: rgba(255, 255, 255, 0.06);
            margin-bottom: 8px;
            position: relative;
        }

        #progressBar {
            height: 100%;
            background: linear-gradient(90deg, var(--gold-dim), var(--gold));
            transition: width 0.3s ease;
            position: absolute;
            left: 0;
            top: 0;
        }

        .rarity-dist {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .rarity-pill {
            font-size: 0.5rem;
            letter-spacing: 1px;
            padding: 2px 8px;
            border: 1px solid;
            color: inherit;
        }

        /* ── TOAST ──────────────────────────────────────────────────── */
        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(12, 11, 9, 0.95);
            border: 1px solid var(--border-h);
            color: var(--gold-bright);
            font-size: 0.65rem;
            letter-spacing: 2px;
            padding: 10px 24px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 1000;
            text-transform: uppercase;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        #toast.error {
            border-color: var(--red);
            color: var(--red);
        }

        #toast.success {
            border-color: var(--cyan);
            color: var(--cyan);
        }

        /* ── MODALE CONFIRM DELETE ──────────────────────────────────── */
        #modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 500;
            display: none;
            align-items: center;
            justify-content: center;
        }

        #modal.open {
            display: flex;
        }

        .modal-box {
            background: var(--surface2);
            border: 1px solid var(--border-h);
            padding: 32px 40px;
            text-align: center;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.9);
            max-width: 340px;
        }

        .modal-box h2 {
            font-family: 'Cinzel Decorative', serif;
            font-size: 0.85rem;
            color: var(--gold);
            letter-spacing: 3px;
            margin: 0 0 12px;
        }

        .modal-box p {
            font-size: 0.65rem;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin: 0 0 24px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn-modal {
            padding: 8px 20px;
            border: 1px solid;
            background: none;
            font-family: 'Cinzel', serif;
            font-size: 0.6rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-modal-cancel {
            border-color: var(--border);
            color: var(--text-dim);
        }

        .btn-modal-cancel:hover {
            border-color: var(--border-h);
            color: var(--text);
        }

        .btn-modal-confirm {
            border-color: rgba(224, 85, 85, 0.5);
            color: var(--red);
        }

        .btn-modal-confirm:hover {
            background: rgba(224, 85, 85, 0.1);
            border-color: var(--red);
        }

        /* ── STATO VUOTO ────────────────────────────────────────────── */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 10px;
            color: var(--text-dim);
        }

        .empty-state .icon {
            font-size: 2.5rem;
            opacity: 0.3;
        }

        .empty-state p {
            font-size: 0.6rem;
            letter-spacing: 2px;
        }

        /* Scrollbar globale */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gold-dim);
        }

        /* Loading spinner */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-size: 0.6rem;
            letter-spacing: 3px;
            color: var(--text-dim);
        }

        .card-thumb.unowned {
            opacity: 0.35;
            filter: grayscale(100%);
            cursor: not-allowed;
        }

        .card-thumb.unowned:hover {
            transform: none;
            border-color: var(--border);
            box-shadow: none;
        }
    </style>
</head>

<body>
    <div id="app">

        <!-- ── TOP BAR ──────────────────────────────────────────────── -->
        <div id="topbar">
            <div class="logo-wrap">
                <img src="/static/src/misc/Elden-Ring-Logo-PNG-File.png" alt="Elden Ring">
                <img src="/static/src/misc/ChatGPT_Image_20_apr_2026__09_53_16-removebg-preview.png" alt="TCG"
                    class="tcg-logo">
            </div>
            <div class="topbar-sep"></div>
            <h1>Deck Builder</h1>
            <div class="topbar-sep"></div>

            <!-- Deck tabs -->
            <div id="deckTabs">
                <!-- generati da JS -->
            </div>
            <button class="btn-new-deck" onclick="createNewDeck()">+ NEW DECK</button>

            <div class="topbar-actions">
                <button class="btn-action btn-equip" id="btnEquip" onclick="equipCurrentDeck()">◆ EQUIP</button>
                <button class="btn-action btn-save" onclick="saveDeck()">✦ SAVE</button>
                <a href="/" class="btn-action btn-back">← HOME</a>
            </div>
        </div>

        <!-- ── WORKSPACE ─────────────────────────────────────────────── -->
        <div id="workspace">

            <!-- BROWSER CARTE -->
            <div id="browser">
                <div id="browserFilters">
                    <span class="filter-label">Category</span>
                    <select class="filter-select" id="filterCat" onchange="applyFilters()">
                        <option value="all">All</option>
                    </select>
                    <span class="filter-label" style="margin-left:10px;">Search</span>
                    <input class="filter-input" id="filterSearch" placeholder="Card name…" oninput="applyFilters()">
                    <span class="filter-label" style="margin-left:10px;">Rarity</span>
                    <select class="filter-select" id="filterRarity" onchange="applyFilters()">
                        <option value="">All</option>
                        <option value="Com">Common</option>
                        <option value="Unc">Uncommon</option>
                        <option value="Rar">Rare</option>
                        <option value="Epi">Epic</option>
                        <option value="Leg">Legendary</option>
                    </select>
                    <button class="btn-action" id="toggleUnownedBtn" onclick="toggleUnownedCards()">
                        Show Unowned
                    </button>
                </div>
                <div id="cardGrid">
                    <div class="loading">Loading cards…</div>
                </div>
            </div>

            <!-- DECK PANEL -->
            <div id="deckPanel">
                <div id="deckHeader">
                    <input id="deckNameInput" type="text" placeholder="Deck name…" maxlength="30" oninput="markDirty()">
                    <div class="deck-stats">
                        Cards: <span id="deckCounter">0 / 40</span>
                        &nbsp;·&nbsp;
                        Deck ID: <span id="deckIdDisplay">—</span>
                    </div>
                </div>

                <div id="deckCardList">
                    <div class="empty-state">
                        <div class="icon"></div>
                        <p>No deck selected</p>
                    </div>
                </div>

                <div id="deckFooter">
                    <div class="progress-bar-wrap">
                        <div id="progressBar" style="width:0%"></div>
                    </div>
                    <div class="rarity-dist" id="rarityDist"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ── TOAST ──────────────────────────────────────────────────── -->
    <div id="toast"></div>

    <!-- ── MODALE ELIMINA ─────────────────────────────────────────── -->
    <div id="modal">
        <div class="modal-box">
            <h2>DELETE DECK</h2>
            <p>Are you sure? This action cannot be undone.</p>
            <div class="modal-actions">
                <button class="btn-modal btn-modal-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-modal btn-modal-confirm" onclick="confirmDelete()">Delete</button>
            </div>
        </div>
    </div>

    <script>
        /* ═══════════════════════════════════════════════════════════════
           STATE
        ═══════════════════════════════════════════════════════════════ */
        let allCards = [];     // tutte le carte dal backend
        let filteredCards = [];     // carte filtrate (browser)
        let decks = [];     // array di deck objects
        let activeDeckIdx = -1;     // indice del deck attivo in `decks`
        let isDirty = false;  // modifiche non salvate
        let deleteTargetId = null;   // id deck da eliminare (modale)
        let showUnowned = false;

        /** Struttura di un deck:
         * {
         *   id: string (firestore doc id, null se nuovo),
         *   name: string,
         *   cards: [ { id, name, rarity, category, count } ],
         *   equipped: bool
         * }
         */

        /* ═══════════════════════════════════════════════════════════════
           INIT
        ═══════════════════════════════════════════════════════════════ */
        document.addEventListener('DOMContentLoaded', async () => {
            await Promise.all([loadCards(), loadDecks()]);
            renderTabs();
            if (decks.length > 0) selectDeck(0);
        });

        /* ═══════════════════════════════════════════════════════════════
           API CALLS
        ═══════════════════════════════════════════════════════════════ */
        async function loadCards() {
            try {
                const res = await fetch('/api/all');

                // Log dello stato HTTP (es: 200, 404, 500)
                console.log("Status Risposta:", res.status, res.statusText);

                if (!res.ok) {
                    // Se il server risponde con un errore, leggiamo il testo dell'errore
                    const errorText = await res.text();
                    console.error("Errore del Server (HTML/Text):", errorText);
                    throw new Error(`Server ha risposto con ${res.status}`);
                }

                const data = await res.json();
                console.log("Dati ricevuti dal backend:", data);

                // Verifichiamo la struttura dei dati
                if (!data.items || !Array.isArray(data.items)) {
                    console.warn("Attenzione: 'items' non è un array o è mancante!", data.items);
                }
                if (!data.collection) {
                    console.warn("Attenzione: 'collection' (inventory) è mancante!");
                }

                allCards = data.items || [];
                userCollection = data.collection || {};

                console.log(`Caricate ${allCards.length} carte.`);
                console.log("Inventory Utente:", userCollection);

                // Popola filtro categorie
                const cats = [...new Set(allCards.map(c => c.category).filter(Boolean))].sort();
                const sel = document.getElementById('filterCat');

                // Pulizia opzioni precedenti (tranne "All")
                sel.innerHTML = '<option value="all">All</option>';

                cats.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c;
                    opt.textContent = c.charAt(0).toUpperCase() + c.slice(1);
                    sel.appendChild(opt);
                });

                applyFilters();
                console.log("--- DEBUG: Fine caricamento con successo ---");

            } catch (err) {
                console.error("--- DEBUG ERROR ---");
                console.error("Messaggio:", err.message);
                console.error("Stack Trace:", err.stack);
                showToast('Error loading cards', 'error');
            }
        }

        async function loadDecks() {
            try {
                const res = await fetch('/api/decks');
                const data = await res.json();
                decks = data.decks || [];
            } catch (e) {
                decks = [];
            }
        }

        async function saveDeck() {
            const deck = activeDeck();
            if (!deck) { showToast('No deck to save', 'error'); return; }

            const name = document.getElementById('deckNameInput').value.trim();
            if (!name) { showToast('Enter a deck name', 'error'); return; }
            deck.name = name;

            const payload = { name: deck.name, cards: deck.cards, equipped: deck.equipped };

            try {
                let res, data;
                if (deck.id) {
                    res = await fetch(`/api/decks/${deck.id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                } else {
                    res = await fetch('/api/decks', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                }
                data = await res.json();
                if (data.status === 'success') {
                    if (!deck.id) deck.id = data.deck_id;
                    isDirty = false;
                    renderTabs();
                    renderDeckPanel();
                    showToast('Deck saved', 'success');
                } else {
                    showToast(data.message || 'Save error', 'error');
                }
            } catch (e) {
                showToast('Network error', 'error');
            }
        }

        async function equipCurrentDeck() {
            const deck = activeDeck();
            if (!deck) return;
            if (!deck.id) { showToast('Save the deck first', 'error'); return; }

            try {
                const res = await fetch(`/api/decks/${deck.id}/equip`, { method: 'POST' });
                const data = await res.json();
                if (data.status === 'success') {
                    decks.forEach(d => d.equipped = false);
                    deck.equipped = true;
                    renderTabs();
                    renderEquipBtn();
                    showToast('Deck equipped ◆', 'success');
                }
            } catch (e) {
                showToast('Equip error', 'error');
            }
        }

        async function deleteDeck(deckId) {
            try {
                const res = await fetch(`/api/decks/${deckId}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.status !== 'success') throw new Error(data.message);
            } catch (e) {
                showToast('Delete error', 'error');
                return false;
            }
            return true;
        }

        /* ═══════════════════════════════════════════════════════════════
           DECK MANAGEMENT
        ═══════════════════════════════════════════════════════════════ */
        function activeDeck() { return activeDeckIdx >= 0 ? decks[activeDeckIdx] : null; }

        function createNewDeck() {
            const deck = { id: null, name: 'New deck', cards: [], equipped: false };
            decks.push(deck);
            selectDeck(decks.length - 1);
            renderTabs();
            document.getElementById('deckNameInput').focus();
            document.getElementById('deckNameInput').select();
            markDirty();
        }

        function selectDeck(idx) {
            activeDeckIdx = idx;
            renderTabs();
            renderDeckPanel();
            renderEquipBtn();
            isDirty = false;
        }

        function addCardToDeck(card) {
            const deck = activeDeck();

            const ownedCopies = userCollection[card.id] || 0;
            if (!deck) { showToast('Select or create a deck first', 'error'); return; }

            const total = deck.cards.reduce((s, c) => s + c.count, 0);
            const check = DECK_RULES.canAdd(card, deck.cards, total);

            if (!check.allowed) { showToast(check.reason, 'error'); return; }

            const existing = deck?.cards.find(
                c => String(c.id) === String(card.id)
            );
            const alreadyInDeck = existing ? existing.count : 0;

            if (alreadyInDeck >= ownedCopies) {
                showToast("You don't own more copies of this card", "error");
                return;
            }

            if (existing) {
                existing.count++;
            } else {
                deck.cards.push({
                    id: card.id,
                    name: card.name,
                    rarity: card.rarity || '',
                    category: card.category || '',
                    count: 1
                });
            }
            markDirty();
            renderDeckPanel();
            renderCardGrid();   // aggiorna badge copie
        }

        function removeOneFromDeck(cardId) {
            const deck = activeDeck();
            if (!deck) return;
            const entry = deck.cards.find(c => String(c.id) === String(cardId));
            if (!entry) return;
            entry.count--;
            if (entry.count <= 0) deck.cards = deck.cards.filter(c => String(c.id) !== String(cardId));
            markDirty();
            renderDeckPanel();
            renderCardGrid();
        }

        function removeAllFromDeck(cardId) {
            const deck = activeDeck();
            if (!deck) return;
            deck.cards = deck.cards.filter(c => String(c.id) !== String(cardId));
            markDirty();
            renderDeckPanel();
            renderCardGrid();
        }

        /* ═══════════════════════════════════════════════════════════════
           RENDER — TABS
        ═══════════════════════════════════════════════════════════════ */
        function renderTabs() {
            const container = document.getElementById('deckTabs');
            container.innerHTML = decks.map((d, i) => `
        <button class="deck-tab ${i === activeDeckIdx ? 'active' : ''} ${d.equipped ? 'equipped-badge' : ''}"
                onclick="selectDeck(${i})">
            ${escHtml(d.name || 'Senza nome')}
            <button class="del-tab" title="Delete deck"
                    onclick="event.stopPropagation(); askDelete(${i})">✕</button>
        </button>
    `).join('');
        }

        /* ═══════════════════════════════════════════════════════════════
           RENDER — DECK PANEL
        ═══════════════════════════════════════════════════════════════ */
        function renderDeckPanel() {
            const deck = activeDeck();
            const nameInput = document.getElementById('deckNameInput');
            const counterEl = document.getElementById('deckCounter');
            const idDisplay = document.getElementById('deckIdDisplay');
            const listEl = document.getElementById('deckCardList');
            const progBar = document.getElementById('progressBar');
            const rarityDist = document.getElementById('rarityDist');

            if (!deck) {
                nameInput.value = '';
                counterEl.textContent = '0 / 40';
                idDisplay.textContent = '—';
                listEl.innerHTML = `
            <div class="empty-state">
                <div class="icon"></div>
                <p>No deck selected</p>
            </div>`;
                progBar.style.width = '0%';
                rarityDist.innerHTML = '';
                return;
            }

            nameInput.value = deck.name || '';
            idDisplay.textContent = deck.id ? deck.id.slice(-6).toUpperCase() : 'New';

            const total = deck.cards.reduce((s, c) => s + c.count, 0);
            const pct = Math.min(100, (total / DECK_RULES.MAX_DECK_SIZE) * 100);

            counterEl.textContent = `${total} / ${DECK_RULES.MAX_DECK_SIZE}`;
            counterEl.className = total >= DECK_RULES.MAX_DECK_SIZE ? 'full' : total > 30 ? 'warning' : '';
            progBar.style.width = pct + '%';

            if (deck.cards.length === 0) {
                listEl.innerHTML = `
            <div class="empty-state">
                <div class="icon">⚔</div>
                <p>Add cards from browser</p>
            </div>`;
            } else {
                listEl.innerHTML = deck.cards.map(entry => {
                    const maxCopies = DECK_RULES.getMaxCopies(entry);
                    const ownedCopies = userCollection[entry.id] || 0;
                    const rColor = DECK_RULES.rarityColor(entry.rarity);
                    return `
            <div class="deck-row">
                <img class="deck-row-thumb"
                     src="/static/src/cards/front/${entry.id}.png"
                     onerror="this.src='https://placehold.co/36x48/111/555?text=?'"
                     alt="${escHtml(entry.name)}">
                <div class="deck-row-info">
                    <div class="deck-row-name">${escHtml(entry.name)}</div>
                    <div class="deck-row-meta" style="color:${rColor}">
                        ${DECK_RULES.rarityLabel(entry.rarity)} · ${entry.category}
                    </div>
                </div>
                <div class="deck-row-count">
                    <button class="count-btn" onclick="removeOneFromDeck('${entry.id}')"
                            title="Remove a copy">−</button>
                    <span class="count-num">
                        ${entry.count}/${ownedCopies}/${maxCopies}
                    </span>
                    <button class="count-btn"
                            onclick="addCardToDeck(${JSON.stringify({ id: entry.id, name: entry.name, rarity: entry.rarity, category: entry.category }).replace(/"/g, '&quot;')})"
                            title="Add a copy(max ${maxCopies})">+</button>
                </div>
                <button class="deck-row-remove" onclick="removeAllFromDeck('${entry.id}')"
                        title="Remove all">×</button>
            </div>`;
                }).join('');
            }

            // Rarity distribution
            const rarityCounts = {};
            deck.cards.forEach(c => {
                rarityCounts[c.rarity] = (rarityCounts[c.rarity] || 0) + c.count;
            });
            rarityDist.innerHTML = Object.entries(rarityCounts).map(([r, n]) => `
        <span class="rarity-pill" style="border-color:${DECK_RULES.rarityColor(r)};color:${DECK_RULES.rarityColor(r)}">
            ${DECK_RULES.rarityLabel(r)}&nbsp;×${n}
        </span>`).join('');
        }

        function renderEquipBtn() {
            const deck = activeDeck();
            const btn = document.getElementById('btnEquip');
            if (!btn) return;
            btn.classList.toggle('is-equipped', !!(deck && deck.equipped));
            btn.textContent = (deck && deck.equipped) ? '◆ Equipped' : '◆ Equip';
        }

        /* ═══════════════════════════════════════════════════════════════
           RENDER — CARD GRID (browser)
        ═══════════════════════════════════════════════════════════════ */
        function applyFilters() {
            const cat = document.getElementById('filterCat').value;
            const search = document.getElementById('filterSearch').value.toLowerCase().trim();
            const rarity = document.getElementById('filterRarity').value;

            filteredCards = allCards.filter(c => {
                const ownedCopies = userCollection[c.id] || 0;

                if (!showUnowned && ownedCopies <= 0) return false;

                if (cat !== 'all' && c.category !== cat) return false;
                if (rarity && c.rarity !== rarity) return false;
                if (search && !c.name?.toLowerCase().includes(search)) return false;

                return true;
            });

            renderCardGrid();
        }

        function renderCardGrid() {
            const deck = activeDeck();
            const grid = document.getElementById('cardGrid');

            if (filteredCards.length === 0) {
                grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:var(--text-dim);font-size:0.6rem;letter-spacing:2px;padding:40px 0">Nessuna carta trovata</div>`;
                return;
            }

            grid.innerHTML = filteredCards.map(card => {
                // Quante copie nel mazzo attivo?
                const ownedCopies = userCollection[card.id] || 0;
                const isOwned = ownedCopies > 0;
                const deckEntry = deck ? deck.cards.find(c => String(c.id) === String(card.id)) : null;
                const copies = deckEntry ? deckEntry.count : 0;
                const maxCopies = DECK_RULES.getMaxCopies(card);
                const isMaxed = copies >= maxCopies;
                const rColor = DECK_RULES.rarityColor(card.rarity);

                return `
                    <div class="card-thumb ${!isOwned ? 'unowned' : ''}"
                        ${isOwned ? `onclick="addCardToDeck(${JSON.stringify(card).replace(/"/g, '&quot;')})"` : ''}
                        title="${escHtml(card.name)}">

                        <img src="/static/src/cards/front/${card.id}.png"
                            alt="${escHtml(card.name)}"
                            loading="lazy">

                        <div class="card-thumb-overlay">
                            <div class="card-thumb-name">${escHtml(card.name)}</div>

                            <div class="card-thumb-rarity" style="color:${rColor}">
                                ${DECK_RULES.rarityLabel(card.rarity)}
                            </div>

                            <div style="font-size:0.5rem;color:white;text-align:center;">
                                Owned: ${ownedCopies}
                            </div>
                        </div>

                        ${copies > 0
                        ? `<div class="copy-badge ${isMaxed ? 'maxed' : ''}">
                                ${copies}/${maxCopies}
                            </div>`
                        : ''
                    }
                    </div>
                    `;
            }).join('');
        }

        /* ═══════════════════════════════════════════════════════════════
           DELETE FLOW
        ═══════════════════════════════════════════════════════════════ */
        function askDelete(deckIdx) {
            const deck = decks[deckIdx];
            if (!deck) return;
            deleteTargetId = { idx: deckIdx, id: deck.id };
            document.getElementById('modal').classList.add('open');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('open');
            deleteTargetId = null;
        }

        async function confirmDelete() {
            if (!deleteTargetId) return;
            const { idx, id } = deleteTargetId;
            closeModal();

            if (id) {
                const ok = await deleteDeck(id);
                if (!ok) return;
            }

            decks.splice(idx, 1);

            if (activeDeckIdx >= decks.length) activeDeckIdx = decks.length - 1;
            if (decks.length === 0) activeDeckIdx = -1;

            renderTabs();
            renderDeckPanel();
            renderEquipBtn();
            renderCardGrid();
            showToast('Deck deleted');
        }

        /* ═══════════════════════════════════════════════════════════════
           UTILS
        ═══════════════════════════════════════════════════════════════ */
        function markDirty() { isDirty = true; }

        let toastTimer = null;
        function showToast(msg, type = '') {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'show' + (type ? ' ' + type : '');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { el.className = ''; }, 2800);
        }

        function escHtml(str) {
            return String(str ?? '')
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        // Avvisa l'utente prima di lasciare la pagina con modifiche non salvate
        window.addEventListener('beforeunload', e => {
            if (isDirty) {
                e.preventDefault();
                e.returnValue = '';
            }
        });

        function toggleUnownedCards() {
            showUnowned = !showUnowned;

            document.getElementById("toggleUnownedBtn").textContent =
                showUnowned ? "Hide Unowned" : "Show Unowned";

            applyFilters();
        }
    </script>
</body>

</html>
