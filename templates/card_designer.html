<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Designer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&display=swap');

        body {
            background: #0a0a0a;
            color: white;
            font-family: "Cinzel", serif;
        }

        .card {
            width: 420px;
            height: 680px;
            /* padding: 16px; */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: visible;
            --border-color: hsl(40, 65%, 80%);
            border: 1px solid var(--border-color);
        }

        /* MIDDLE (DEFAULT INVISIBILE) */
        .card .middle.left.hor {
            width: 1px;
            height: 1px;
            position: relative;
            top: 50%;
            bottom: 50%;
        }

        .card .middle.right.hor {
            width: 1px;
            height: 1px;
            position: relative;
            top: 50%;
            bottom: 50%;
        }

        /* DOPPIO (DEFAULT INVISIBILE) */
        .card .corner.top1.left1 {
            visibility: hidden;
        }

        .card .corner.bottom1.left1 {
            visibility: hidden;
        }

        .card .corner.bottom1.right1 {
            visibility: hidden;
        }

        .card .corner.top1.right1 {
            visibility: hidden;
        }

        /* CORNER BASE */
        .card .corner {
            width: 15px;
            height: 15px;
            border: 1px solid var(--border-color);
            position: absolute;
        }

        .card .corner::after,
        .card .corner::before {
            content: "";
            position: absolute;
            border-color: var(--border-color);
            background-color: transparent;
            border-width: 1px;
        }

        .card .corner.top {
            top: -15px;
        }

        .card .corner.bottom {
            bottom: -15px;
        }

        .card .corner.left {
            left: -15px;
        }

        .card .corner.right {
            right: -15px;
        }

        .card .corner.top.left::after {
            width: 50px;
            height: 15px;
            top: 5px;
            left: 20px;
            border-bottom: transparent;
            border-right: transparent;
        }

        .card .corner.top.right::after {
            width: 50px;
            height: 15px;
            top: 5px;
            right: 20px;
            border-bottom: transparent;
            border-left: transparent;
        }

        .card .corner.top.left::before {
            width: 15px;
            height: 50px;
            left: 5px;
            top: 20px;
            border-bottom: transparent;
            border-right: transparent;
        }

        .card .corner.top.right::before {
            width: 15px;
            height: 50px;
            right: 5px;
            top: 20px;
            border-bottom: transparent;
            border-left: transparent;
        }

        /* bottom */
        .card .corner.bottom.left::after {
            width: 50px;
            height: 15px;
            bottom: 5px;
            left: 20px;
            border-top: transparent;
            border-right: transparent;
        }

        .card .corner.bottom.right::after {
            width: 50px;
            height: 15px;
            bottom: 5px;
            right: 20px;
            border-top: transparent;
            border-left: transparent;
        }

        .card .corner.bottom.left::before {
            width: 15px;
            height: 50px;
            left: 5px;
            bottom: 20px;
            border-top: transparent;
            border-right: transparent;
        }

        .card .corner.bottom.right::before {
            width: 15px;
            height: 50px;
            right: 5px;
            bottom: 20px;
            border-top: transparent;
            border-left: transparent;
        }

        /* NON COMUNE */

        .card.rarity-Unc .middle.left.hor {
            visibility: hidden;
            width: 1px;
            height: 40px;
            position: absolute;
            top: calc(50% - 20px);
            left: -5px;
            background-color: var(--border-color);
        }

        .card.rarity-Unc .middle.right.hor {
            visibility: hidden;
            width: 1px;
            height: 40px;
            position: absolute;
            top: calc(50% - 20px);
            right: -5px;
            background-color: var(--border-color);
        }

        .rarity-Unc {
            --border-color: rgb(123, 183, 152);
        }

        .rarity-Unc .card {
            box-shadow: 0 0 10px rgba(123, 183, 152, 0.3);
        }

        .rarity-Unc .corner::after,
        .rarity-Unc .corner::before {
            opacity: 0.9;
        }

        /* RARO */

        .card.rarity-Rar .middle.left.hor {
            width: 1px;
            height: 40px;
            position: absolute;
            top: calc(50% - 20px);
            left: -5px;
            background-color: var(--border-color);
        }

        .card.rarity-Rar .middle.right.hor {
            width: 1px;
            height: 40px;
            position: absolute;
            top: calc(50% - 20px);
            right: -5px;
            background-color: var(--border-color);
        }

        .rarity-Rar {
            --border-color: #5bbcff;
        }

        .rarity-Rar .card {
            box-shadow: 0 0 10px rgba(91, 188, 255, 0.3);
        }

        .rarity-Rar .corner::after,
        .rarity-Rar .corner::before {
            opacity: 0.9;
        }

        /* EPICO */

        .card.rarity-Epi .middle.left.ver {
            width: 50px;
            height: 1px;
            position: absolute;
            top: calc(50% - 35px);
            left: -5px;
            background-color: var(--border-color);
        }

        .card.rarity-Epi .middle.right.ver {
            width: 50px;
            height: 1px;
            position: absolute;
            top: calc(50% - 35px);
            right: -5px;
            background-color: var(--border-color);
        }

        .card.rarity-Epi .middle.left.hor {
            width: 1px;
            height: 70px;
            position: absolute;
            top: calc(50% - 35px);
            left: -5px;
            background-color: var(--border-color);
        }

        .card.rarity-Epi .middle.right.hor {
            width: 1px;
            height: 70px;
            position: absolute;
            top: calc(50% - 35px);
            right: -5px;
            background-color: var(--border-color);
        }

        .rarity-Epi {
            --border-color: #b26bff;
        }

        .rarity-Epi .card {
            box-shadow: 0 0 20px rgba(178, 107, 255, 0.4);
        }

        .rarity-Epi .card::before {
            content: "";
            position: absolute;
            inset: -6px;
            border: 1px solid rgba(178, 107, 255, 0.3);
            pointer-events: none;
        }

        .card.rarity-Epi .corner.top1 {
            top: -10px;
            visibility: visible;
        }

        .card.rarity-Epi .corner.bottom1 {
            bottom: -10px;
            visibility: visible;
        }

        .card.rarity-Epi .corner.left1 {
            left: -10px;
            visibility: visible;
        }

        .card.rarity-Epi .corner.right1 {
            right: -10px;
            visibility: visible;
        }

        .card.rarity-Epi .corner.top1.left1::after {
            width: 100px;
            height: 15px;
            top: 5px;
            left: 20px;
            border-bottom: transparent;
            border-right: transparent;
        }

        .card.rarity-Epi .corner.top1.right1::after {
            width: 100px;
            height: 15px;
            top: 5px;
            right: 20px;
            border-bottom: transparent;
            border-left: transparent;
        }

        .card.rarity-Epi .corner.top1.left1::before {
            width: 15px;
            height: 120px;
            left: 5px;
            top: 20px;
            border-bottom: transparent;
            border-right: transparent;
        }

        .card.rarity-Epi .corner.top1.right1::before {
            width: 15px;
            height: 120px;
            right: 5px;
            top: 20px;
            border-bottom: transparent;
            border-left: transparent;
        }

        /* bottom */
        .card.rarity-Epi .corner.bottom1.left1::after {
            width: 100px;
            height: 15px;
            bottom: 5px;
            left: 20px;
            border-top: transparent;
            border-right: transparent;
        }

        .card.rarity-Epi .corner.bottom1.right1::after {
            width: 100px;
            height: 15px;
            bottom: 5px;
            right: 20px;
            border-top: transparent;
            border-left: transparent;
        }

        .card.rarity-Epi .corner.bottom1.left1::before {
            width: 15px;
            height: 120px;
            left: 5px;
            bottom: 20px;
            border-top: transparent;
            border-right: transparent;
        }

        .card.rarity-Epi .corner.bottom1.right1::before {
            width: 15px;
            height: 120px;
            right: 5px;
            bottom: 20px;
            border-top: transparent;
            border-left: transparent;
        }

        /* LEGGENDARIO */

        .rarity-Leg {
            --border-color: #f5d36b;
        }

        .card.rarity-Leg .middle.left.ver {
            width: 50px;
            height: 1px;
            position: absolute;
            top: -5px;
            left: calc(50% - 25px);
            background-color: var(--border-color);
        }

        .card.rarity-Leg .middle.right.ver {
            width: 50px;
            height: 1px;
            position: absolute;
            bottom: -5px;
            right: calc(50% - 25px);
            background-color: var(--border-color);
        }

        .card.rarity-Leg .middle.left.hor {
            width: 1px;
            height: 100px;
            position: absolute;
            top: calc(50% - 50px);
            left: -5px;
            background-color: var(--border-color);
        }

        .card.rarity-Leg .middle.right.hor {
            width: 1px;
            height: 100px;
            position: absolute;
            top: calc(50% - 50px);
            right: -5px;
            background-color: var(--border-color);
        }

        .rarity-Leg .card {
            box-shadow: 0 0 20px rgba(178, 107, 255, 0.4);
        }

        .rarity-Leg .card::before {
            content: "";
            position: absolute;
            inset: -6px;
            border: 1px solid rgba(178, 107, 255, 0.3);
            pointer-events: none;
        }

        .card.rarity-Leg .corner.top1 {
            top: -10px;
            visibility: visible;
        }

        .card.rarity-Leg .corner.bottom1 {
            bottom: -10px;
            visibility: visible;
        }

        .card.rarity-Leg .corner.left1 {
            left: -10px;
            visibility: visible;
        }

        .card.rarity-Leg .corner.right1 {
            right: -10px;
            visibility: visible;
        }

        .card.rarity-Leg .corner.top1.left1::after {
            width: 100px;
            height: 15px;
            top: 5px;
            left: 20px;
            border-bottom: transparent;
            border-right: transparent;
        }

        .card.rarity-Leg .corner.top1.right1::after {
            width: 100px;
            height: 15px;
            top: 5px;
            right: 20px;
            border-bottom: transparent;
            border-left: transparent;
        }

        .card.rarity-Leg .corner.top1.left1::before {
            width: 15px;
            height: 120px;
            left: 5px;
            top: 20px;
            border-bottom: transparent;
            border-right: transparent;
        }

        .card.rarity-Leg .corner.top1.right1::before {
            width: 15px;
            height: 120px;
            right: 5px;
            top: 20px;
            border-bottom: transparent;
            border-left: transparent;
        }

        /* bottom */
        .card.rarity-Leg .corner.bottom1.left1::after {
            width: 100px;
            height: 15px;
            bottom: 5px;
            left: 20px;
            border-top: transparent;
            border-right: transparent;
        }

        .card.rarity-Leg .corner.bottom1.right1::after {
            width: 100px;
            height: 15px;
            bottom: 5px;
            right: 20px;
            border-top: transparent;
            border-left: transparent;
        }

        .card.rarity-Leg .corner.bottom1.left1::before {
            width: 15px;
            height: 120px;
            left: 5px;
            bottom: 20px;
            border-top: transparent;
            border-right: transparent;
        }

        .card.rarity-Leg .corner.bottom1.right1::before {
            width: 15px;
            height: 120px;
            right: 5px;
            bottom: 20px;
            border-top: transparent;
            border-left: transparent;
        }

        .stat {
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 6px 8px;
            border-radius: 8px;
            font-size: 12px;
        }

        .card-wrapper {
            width: 420px;
            height: 680px;
            perspective: 1200px;
            transform-style: preserve-3d;
            overflow: visible;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s ease;
        }

        /* HOVER */
        .card-wrapper:hover {
            transform: translateY(-10px) scale(1.35);
            transition: transform 0.2s ease;
        }

        .face {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
        }

        .front {
            z-index: 2;
        }

        .card-wrapper.flipped .card-inner {
            transform: rotateY(180deg);
        }

        /* BACK */

        .back {
            transform: rotateY(180deg);
        }

        .back {
            position: absolute;
            inset: 0;
            display: block;
            overflow: hidden;
            justify-content: center;
            align-items: center;
            background: #111;
            border: 15px solid #968d77;
            border-radius: 15px;
            /* sempre common */
        }

        .back::after {
            content: "";
            position: absolute;
            inset: 0;
            box-shadow: inset 0 0 30px 30px rgba(0, 0, 0, 0.8);
        }

        .back-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .card-content {
            padding: 16px;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-color: #0a0a0a;
        }

        .name-banner {
            /* Dimensioni del ritaglio basate sulle coordinate fornite */
            width: 100%;
            /* Si adatta al contenitore della carta */
            height: 45px;

            background-repeat: no-repeat;

            /* 
            Spostiamo l'immagine in alto a sinistra (0,0). 
            background-size deve essere proporzionato alla larghezza totale 
            dello sprite originale per mantenere le proporzioni.
            */
            background-image: url('static/src/misc/Name_Banner.png');
            background-size: 100% 100%;

            /* Centratura del testo */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ninepatch {
            /* 1. Definiamo lo spessore visivo del bordo (quello che non deve stretchare) */
            border-top: 20px solid transparent;
            border-bottom: 20px solid transparent;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;

            /* 2. Applichiamo la "Nine-Patch" */
            border-image-source: url('static/src/misc/NinePatchRect.png');

            /* 3. Lo 'slice': indica a che distanza dai bordi tagliare (in pixel nell'immagine originale) */
            /* Se i tuoi angoli decorati sono grandi 40px, metti 40. 
            Il comando 'fill' serve a mantenere visibile anche il centro del rettangolo */
            border-image-slice: 40 fill;

            /* 4. Come gestire i segmenti centrali (gli spigoli): 
            'repeat' o 'round' (ripete senza tagliare) invece di stretch */
            border-image-repeat: repeat;

            /* Layout del testo */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60px;
            color: #edd7ab;
            padding: 10px;
        }

        .topprpr {
            width: 100%;
            height: 35px;

            background-repeat: no-repeat;
            background-image: url('static/src/misc/SB_Chara.png');
            background-position: 0px 0px;
            background-size: 100% 315px;
        }

        .attributes-container {
            position: absolute;
            left: -90px;
            top: 0;
            width: 80px;
            height: 100%;

            display: flex;
            flex-direction: column;
            justify-content: center;

            opacity: 0;
            transform: translateX(20px);
            transition: all 0.3s ease;

            pointer-events: none;
            z-index: 999;
        }

        .card-wrapper:hover .attributes-container {
            opacity: 1;
            transform: translateX(0);
        }
    </style>
</head>

    <!-- CARD CONTAINER -->
    <div class="flex justify-center">

    <script>
        const ITEM = {{ item | tojson | safe }};
        const TYPE = "{{ card_type }}";
    </script>

    <script>
        let currentType = 'character';

        class Card {
            constructor(data) {
                this.data = data || {};
            }

            renderWeapon() {
                // FIX: Se l'immagine manca, usa un placeholder
                const imageSrc = (this.data.img && this.data.img !== "")
                    ? this.data.img
                    : "https://placehold.co";

                const typeColors = {
                    "Phy": "border-gray-500",
                    "Mag": "border-blue-500",
                    "Fire": "border-red-600",
                    "Ligt": "border-yellow-400",
                    "Holy": "border-yellow-100"
                };

                const atk = this.data.attack || [];
                const def = this.data.defence || [];

                const getStat = (list, name) => {
                    const item = list.find(i => i.name.toLowerCase().startsWith(name.toLowerCase()));
                    return item ? item.amount : "0";
                };

                const statsTypes = ["Phy", "Mag", "Fire", "Ligt", "Holy"];

                // 2. Logica attributi (Str, Dex, Int, Fth, Arc)
                const attributes = ["Str", "Dex", "Int", "Fai", "Arc"];
                const scaling = this.data.scalesWith || [];
                const required = this.data.requiredAttributes || [];

                let range = "";
                if (this.data.range == 1) {
                    range = "Single";
                } else if (this.data.range == 2) {
                    range = "Area";
                } else {
                    range = "Ranged";
                }

                const rarityClass = `rarity-${this.data.rarity || "common"}`;

                const cardType = "WEAPON";

                const passivesHtml = (this.data.passives && this.data.passives.length > 0)
                    ? this.data.passives.map(p => `
        <div class="flex justify-between">
            <span>${p.type}</span>
            <span class="opacity-70">${p.amount}%</span>
        </div>
    `).join("")
                    : `<div class="opacity-40">None</div>`;

                const attributeSlotsHtml = attributes.map(attr => {
                    const s = scaling.find(i => i.name.startsWith(attr))?.scaling || "-";
                    const r = required.find(i => i.name.startsWith(attr))?.amount || "-";
                    return `
        <div class="flex-1 border border-[#edd7ab]/40 rounded-lg p-1 flex flex-col items-center justify-center bg-[#1c1b1b]" style="width:60px; height:80px; margin:8px; pointer-events: none;">
            <div class="text-[14px] text-[#edd7ab] font-bold">${attr.toUpperCase()}</div>
            <div class="text-[16px] text-white font-bold">${s}</div>
            <div class="text-[12px] opacity-40">${r}</div>
        </div>`;
                }).join("");
                return `
    <div class="card-wrapper" onclick="this.classList.toggle('flipped')">
        <div class="card-inner">

            <!-- FRONT -->
            <div class="card face front relative ${rarityClass}" style="overflow: visible !important;">
                <div class="attributes-container">
                    <div class="flex-column gap-10 mb-4">
                        ${attributeSlotsHtml}
                    </div>
                </div>
                    <!-- 5 Slot Attributi -->
                <div class="card-content">

                    <!-- CORNER -->
                    <div class="corner top left"></div>
                    <div class="corner top right"></div>
                    <div class="corner bottom left"></div>
                    <div class="corner bottom right"></div>

                    <div class="corner top1 left1"></div>
                    <div class="corner top1 right1"></div>
                    <div class="corner bottom1 left1"></div>
                    <div class="corner bottom1 right1"></div>

                    <div class="middle hor left"></div>
                    <div class="middle hor right"></div>
        
                    <!-- HEADER: Category a SX, AtkType a DX -->
                    <div class="mb-2 px-1 topprpr" style="display: grid;grid-template-columns: 1fr auto 1fr;align-items: center;width: 100%; grid-gap: 20px;">
                        <div class="bg-[#1c1b1b] px-4 py-1 text-[#edd7ab] font-bold text-sm w-30" style="text-align:center;">
                            ${this.data.category || '-'}
                        </div>
                        <div class="bg-[#1c1b1b] px-4 py-1 text-[#edd7ab] font-bold text-sm" style="text-align: center;">
                            ${cardType}    
                        </div>
                        <div class="bg-[#1c1b1b] px-4 py-1 text-[#edd7ab] font-bold text-sm w-30" style="text-align:center;">
                            ${this.data.atktype || '-'}
                        </div>
                    </div>

                    <!-- SEZIONE CENTRALE (Atk | Immagine | Def) -->
                    <div class="flex gap-2 h-64 mb-1">
                        <!-- Colonna ATK con bordi colorati -->
                        <div class="w-1/5 flex flex-col gap-1">
                            <div class="text-center text-[10px] font-bold opacity-50 uppercase">Atk</div>
                            ${statsTypes.map(t => `<div class="bg-[#1c1b1b] border-l-4 ${typeColors[t]} rounded-r h-7 flex items-center justify-center text-[10px]">${getStat(atk, t)}</div>`).join('')}
                            <div class="bg-white/10 rounded h-5 flex items-center justify-center text-[9px] mt-10">W: ${this.data.weight || '-'}</div>
                            </div>

                        <!-- Immagine -->
                        <div class="flex-1 bg-[#d1d1d10a] rounded-2xl overflow-hidden border border-white/10">
                            <img src="${imageSrc}" class="w-full h-full object-contain p-4">
                        </div>

                        <!-- Colonna DEF con bordi colorati -->
                        <div class="w-1/5 flex flex-col gap-1">
                            <div class="text-center text-[10px] font-bold opacity-50 uppercase">Def</div>
                            ${statsTypes.map(t => `<div class="bg-[#1c1b1b] border-r-4 ${typeColors[t]} rounded-l h-7 flex items-center justify-center text-[10px]">${getStat(def, t)}</div>`).join('')}
                            <div class="bg-white/10 rounded h-5 flex items-center justify-center text-[9px] mt-10">R: ${range || '-'}</div>
                        </div>
                    </div>

                    <!-- Barra Grigia (Weight e Range) -->
                    <div class="flex gap-2 mb-4 px-1" style="top:-20px;">
                        
                        <div class="flex-1"></div>
                        
                    </div>

                    <!-- NOME -->
                    <div class="relative">
                        <div class="name-banner flex items-center justify-center">
                            <h2 class="text-2xl font-bold text-center py-1 tracking-wide uppercase">${this.data.name}</h2>
                        </div>
                    </div>

                    <!-- Game Description -->
                    <div class="ninepatch">
                        <div class="flex-1 space-y-4 px-2" overflow-y-auto">
                            <p class="text-[11px] text-white/60 italic leading-relaxed" style="text-align: justify;text-justify:inter-word;background:transparent;">${this.data.desc || '...'}</p>
                        </div>
                    </div>

                    <!-- Attacchi (Mostra Danno) -->
                    <div class="flex gap-2 mb-2">
