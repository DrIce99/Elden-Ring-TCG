    <main class="max-w-6xl mx-auto">
        <!-- FILTER BAR STILE ELDEN -->
        <div class="glass p-8 rounded-lg mb-10">
            <form method="GET" class="grid md:grid-cols-3 gap-8 items-end">
                <div>
                    <label class="text-[10px] uppercase tracking-widest text-yellow-600/80 mb-3 block">Category</label>
                    <select name="category" class="w-full p-3 rounded-md outline-none">
                        <option value="all">All</option>
                        {% for cat in categories %}
                        <option value="{{ cat }}" {% if sel_cat==cat %}selected{% endif %}>{{ cat }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="text-[10px] uppercase tracking-widest text-yellow-600/80 mb-3 block">Location</label>
                    <input type="text" name="area" value="{{ request.args.get('area', '') }}" placeholder="ex. Limgrave"
                        class="w-full p-3 rounded-md outline-none placeholder:opacity-30">
                </div>
                <button type="submit" class="btn-filter rounded-md px-6 py-3 uppercase text-sm">
                    Apply filter
                </button>
            </form>
        </div>

        <!-- Ordinamento -->
        <div class="flex justify-end mb-6">
            <div class="flex items-center gap-3">
                <span class="text-[10px] uppercase opacity-40">Order by:</span>
                <select onchange="changeSort(this.value)" class="text-xs p-2 rounded-md">
                    <option value="id_asc">ID Asc</option>
                    <option value="id_desc">ID Desc</option>
                    <option value="rarity">Rarity Asc</option>
                    <option value="rarity_desc">Rarity Desc</option>
                </select>
            </div>
        </div>

        <!-- ITEMS CONTAINER -->
        <div id="itemsContainer" class="space-y-6">
            <!-- Qui verranno caricate le righe delle carte -->
        </div>
    </main>

    <script>
        // Dati iniziali dal backend
        let allItems = {{ items | tojson | safe }};

        let currentSort = "id_asc";

        const rarityOrder = {
            "Com": 0,
            "Unc": 1,
            "Rar": 2,
            "Epi": 3,
            "Leg": 4
        };

        function sortItems(items) {
            const sorted = [...items];

            switch (currentSort) {
                case "id_asc":
                    sorted.sort((a, b) => Number(a.id) - Number(b.id));
                    break;

                case "id_desc":
                    sorted.sort((a, b) => Number(b.id) - Number(a.id));
                    break;

                case "rarity":
                    sorted.sort((a, b) => {
                        return (rarityOrder[a.rarity] ?? 0) - (rarityOrder[b.rarity] ?? 0);
                    });
                    break;
                case "rarity_desc":
                    sorted.sort((a, b) => {
                        return (rarityOrder[b.rarity] ?? 0) - (rarityOrder[a.rarity] ?? 0);
                    });
                    break;

                case "category":
                    sorted.sort((a, b) => {
                        return (a.category || "").localeCompare(b.category || "");
                    });
                    break;
            }

            return sorted;
        }

        function changeSort(sortType) {
            currentSort = sortType;
            renderItems(allItems);
        }

        document.querySelector("form").addEventListener("submit", async (e) => {
            e.preventDefault();

            const formData = new FormData(e.target);
            const params = new URLSearchParams(formData);

            const res = await fetch(`/api/all?${params.toString()}`);
            const data = await res.json();

            allItems = data.items;
            renderItems(allItems);
        });

        function renderItems(items = allItems) {
            const container = document.getElementById('itemsContainer');

            const sortedItems = sortItems(items);

            if (!items || items.length === 0) {
                container.innerHTML = `
                    <div class="glass p-8 text-center rounded-2xl col-span-full">
                        <div class="text-4xl opacity-30 mb-4">🎴</div>
                        <p class="text-lg opacity-60 mb-2">Nessuna carta trovata</p>
                        <p class="text-sm opacity-40">Prova a modificare i filtri</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = sortedItems.map(item => `
    <a href="/card/${item.id}?category=${item.category || ''}"
       class="block group relative overflow-hidden">
        <div style="text-align:center;">${item.id}</div>

        <img src="/static/src/cards/front/${item.id}.png"
             class="w-full h-128 object-cover transition-transform duration-300 group-hover:scale-105"
             alt="${item.name || 'Carta'}"
             onerror="this.src='https://placehold.co/300x400'">

    </a>
`).join('');
        }

        // View switcher
        function setView(mode) {
            const container = document.getElementById('itemsContainer');

            container.classList.remove('space-y-6');
            container.classList.add('grid', 'grid-cols-2', 'md:grid-cols-3', 'lg:grid-cols-4', 'gap-6');
        }

        // Dettaglio carta
        function openCardDetail(cardId, category) {
            window.location.href = `/card/${cardId}?category=${category}`;
        }

        // Fetch completo
        async function fetchAllData() {
            try {
                const btns = document.querySelectorAll('button');
                btns.forEach(btn => btn.disabled = true);

                const response = await fetch('/api/all');
                const data = await response.json();
                allItems = data.items;
                renderItems(allItems);

                // Toast di successo
                showToast('✅ Database aggiornato!');
            } catch (error) {
                console.error('Errore:', error);
                showToast('❌ Errore nel caricamento');
            } finally {
                document.querySelectorAll('button').forEach(btn => btn.disabled = false);
            }
        }

        // Toast notification
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'fixed top-4 right-4 glass p-4 rounded-xl shadow-2xl z-50 animate-slide-in';
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // Init
        document.addEventListener('DOMContentLoaded', async () => {
            const res = await fetch('/api/all');
            const data = await res.json();

            allItems = data.items;
            renderItems(allItems);
            setView('card');
        });
    </script>
</body>
