<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table designer</title>
    <link rel="stylesheet" href="/static/css/table.css">
    <link rel="stylesheet" href="/static/css/final_cards.css">
</head>

<body>
    <div id="game-table" class="game-table">
        <div class="container">
            <div class="side-slots-container">
                <div class="side-slots">
                    <div class="slot deck enemy" data-label="Deck"></div>
                </div>
                <div class="side-slots">
                    <div id="player-deck" class="slot deck" data-label="Deck"></div>
                </div>
            </div>

            <!-- AREA AVVERSARIO (Speculare) -->
            <div class="player-area-container">
                <div class="player-area opponent backgrounder">

                    <!-- RIGA 2: Campo di Battaglia e Supporto -->
                    <div class="battlefield-row">
                        <div class="backgrounder2">
                            <div class="slot support enemy" data-label="Support"></div>
                        </div>
                        <div class="battle-slots backgrounder2">
                            <div class="slot battle"></div>
                            <div class="slot battle"></div>
                            <div class="slot battle"></div>
                            <div class="slot battle"></div>
                            <div class="slot battle"></div>
                        </div>
                    </div>
                </div>

                <!-- AREA GIOCATORE -->
                <div class="player-area player backgrounder">
                    <!-- RIGA 1: Campo di Battaglia e Supporto -->
                    <div class="battlefield-row">
                        <div class="backgrounder2">
                            <div class="slot support" data-label="Support"></div>
                        </div>
                        <div class="battle-slots backgrounder2">
                            <div class="slot battle"></div>
                            <div class="slot battle"></div>
                            <div class="slot battle"></div>
                            <div class="slot battle"></div>
                            <div class="slot battle"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="side-slots-container2">

                <!-- RIGA 1: Deck e Cimitero -->
                <div class="side-slots">
                    <div class="slot graveyard enemy" data-label="Erdtree"></div>
                </div>

                <div class="side-slots">
                    <div class="slot graveyard" data-label="Erdtree"></div>
                </div>
            </div>
        </div>

        <div id="opponent-hand" class="hand-container opponent-hand"></div>
        <div id="player-hand" class="hand-container player-hand"></div>

        <button onclick="nextPhaseAuto()" class="phase-button">Next Phase</button>

        <div class="hud">
            <div id="current-phase" class="phase-display">Draw</div>
        </div>

        <div class="rune-counter">
            Your Runes: <span id="player-runes">20</span> | Opponent: <span id="opponent-runes">20</span>
        </div>

    </div>
    <!-- Overlay Selezione Carta -->
    <div id="card-hover-panel" class="hiddenn"></div>
    <div id="card-preview-top" class="hiddenn"></div>
    <script>
        const DECK_DATA = {{ deck | tojson }};
        const OPPONENT_DECK_DATA = [...DECK_DATA].reverse();
        const PLAYER_DECK_DATA = [...DECK_DATA];

        window.playerDeck = [...PLAYER_DECK_DATA];
        window.opponentDeck = [...OPPONENT_DECK_DATA];
    </script>
    <!-- <script src="/static/js/cards.js"></script> -->
    <script src="/static/js/card_effects.js"></script>
    <script src="/static/js/turn-manager.js"></script>
    <script src="/static/js/game_rules.js"></script>
    <script src="/static/js/table.js"></script>
    <script>
        // Inizializza dopo caricamento
        document.addEventListener('DOMContentLoaded', () => {
            initCardSelection();
        });

        function initCardSelection() {
            // Aggiungi dataset.card a TUTTE le carte esistenti
            document.querySelectorAll('.card-wrapper').forEach(wrapper => {
                const slot = wrapper.closest('.slot');
                if (slot?.dataset.card) {
                    wrapper.dataset.card = slot.dataset.card;
                }
            });
            console.log('✅ Card selection inizializzata');
        }
    </script>
</body>

</html>
