<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Elden Ring TCG - Choose Username</title>
    <link rel="stylesheet" href="/static/css/home.css">
    <style>
        .btn-filter {
            background: linear-gradient(135deg, rgb(255, 230, 180), #c89b2f, #8a6d25);
            color: black;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-filter:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(200, 155, 47, 0.4);
            filter: brightness(1.2);
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="login-box">
            <h2 class="login-title">Choose your username</h2>

            <input id="username" class="login-subtitle" placeholder="Enter username">
            <button class="btn-filter" onclick="save()">Confirm</button>
        </div>
    </div>

    <script>
        async function save() {
            const username = document.getElementById("username").value;

            const res = await fetch("/api/set-username", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username })
            });

            const data = await res.json();

            if (data.status === "success") {
                window.location.href = "/";
            } else {
                alert(data.message);
            }
        }
    </script>

</body>

</html>
